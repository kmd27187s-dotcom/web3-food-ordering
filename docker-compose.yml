services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - RPC_URL=${RPC_URL:-http://host.docker.internal:8545}
      - CONTRACT_ADDRESS=${CONTRACT_ADDRESS}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_CONTRACT_ADDRESS: ${CONTRACT_ADDRESS}
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
