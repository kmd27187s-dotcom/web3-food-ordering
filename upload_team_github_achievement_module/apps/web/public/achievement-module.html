<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>去中心化社交點餐系統</title>
  <style>
    :root{--bg:#f6efe6;--panel:#fffaf4;--card:#fffdf9;--line:#dbcab6;--text:#2d2219;--muted:#766453;--accent:#b36a3c;--tag:#f0e3d5;--bronze:#b87333;--gold:#c7922f}
    *{box-sizing:border-box} body{margin:0;font-family:"Segoe UI","Noto Sans TC",sans-serif;background:var(--bg);color:var(--text)} h1,h2,h3,p{margin:0}
    .wrap{max-width:1400px;margin:0 auto;padding:24px 16px 40px}.hero,.panel{background:var(--panel);border:1px solid var(--line);border-radius:22px;box-shadow:0 14px 28px rgba(95,72,44,.08)}
    .hero{padding:22px;margin-bottom:18px}.panel{padding:18px;margin-bottom:16px}.grid{display:grid;grid-template-columns:1.1fr .9fr;gap:16px}.two{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.three{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:14px}
    .stat,.card,.badge-card,.reward-box{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 16px}.stat strong{display:block;margin-top:6px;font-size:28px;font-family:Georgia,"Noto Serif TC",serif}
    .comment-panel .card{padding:14px 16px}.comment-panel .chip{padding:8px 12px;font-size:13px}.comment-panel textarea{min-height:92px}.comment-panel input,.comment-panel select,.comment-panel textarea{padding:12px}.comment-panel button{padding:12px 14px}.comment-panel h3{font-size:18px !important}
    .hint,.meta,label{color:var(--muted)}.section{margin-top:16px}.toolbar,.row{display:flex;justify-content:space-between;gap:10px;align-items:end}.row{align-items:center}.list{display:grid;gap:12px;margin-top:14px}.chips,.tags{display:flex;flex-wrap:wrap;gap:8px}.category-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
    .chip,.tag,.badge,.reward-pill{display:inline-flex;align-items:center;padding:8px 12px;border-radius:999px;font-size:13px;font-weight:700}.chip{border:1px solid var(--line);background:#f7efe5;color:var(--text);cursor:pointer;justify-content:center}.chip.active{background:var(--accent);border-color:var(--accent);color:#fffaf4}.tag,.badge,.reward-pill{background:var(--tag);color:#7a5c40}
    .message{min-height:24px;margin-top:8px}.success{color:#276749;font-weight:700}.error{color:#c05621;font-weight:700}.empty{padding:20px;border:1px dashed var(--line);border-radius:16px;text-align:center;color:var(--muted);background:var(--card)}.stars{color:var(--gold);letter-spacing:2px;font-weight:700}.bronze-name{color:var(--bronze)}
    input,select,textarea,button{width:100%;font:inherit;border-radius:12px} input,select,textarea{padding:12px;border:1px solid var(--line);background:var(--card);color:var(--text)} textarea{min-height:92px;resize:vertical}
    button{border:0;padding:12px 14px;font-weight:700;background:linear-gradient(135deg,#d59a6f,#b36a3c);color:#fffaf4;cursor:pointer}button.secondary{background:var(--card);color:var(--text);border:1px solid var(--line)}button:disabled{opacity:.45;cursor:not-allowed}
    .skyline{margin-top:16px;border:1px solid var(--line);border-radius:18px;overflow:hidden;background:linear-gradient(180deg,#f8f4ed,#f2e6d8)}.skygrid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;align-items:end;padding:18px}
    .building-btn{appearance:none;border:0;background:transparent;padding:0;display:grid;gap:10px;align-items:end;justify-items:center;cursor:pointer}.building-frame{width:100%;min-height:250px;padding:10px 8px 0;border:1px solid transparent;border-radius:16px;transition:.18s}.building-btn:hover .building-frame,.building-btn.active .building-frame{transform:translateY(-4px);border-color:var(--accent);box-shadow:0 12px 22px rgba(179,106,60,.15);background:rgba(255,255,255,.44)}.building-meta{text-align:center;padding-bottom:8px}.building-meta strong{display:block;font-size:18px;font-family:Georgia,"Noto Serif TC",serif;color:#7a5638}
    .pager{display:flex;justify-content:space-between;align-items:center;padding:0 18px 18px}.pager button{width:auto;padding:8px 14px}.progress{height:10px;border-radius:999px;background:#ece0d3;overflow:hidden;margin-top:10px}.progress>span{display:block;height:100%;background:linear-gradient(90deg,#d59a6f,#b36a3c)}
    .badge-card{background:linear-gradient(180deg,#fffdf8,#f7efe4)}.badge-header{display:flex;justify-content:space-between;gap:10px;align-items:start}.badge-mark{width:62px;height:62px;border-radius:18px;display:grid;place-items:center;font-size:28px;font-weight:700;color:#7a5638;background:linear-gradient(135deg,#f6e7d5,#e8c79d);border:1px solid #d8b78b}
    svg{display:block;width:100%;height:auto}@media (max-width:1180px){.grid,.two,.three,.stats,.skygrid,.category-grid{grid-template-columns:1fr}.toolbar,.row,.pager,.badge-header{display:grid;align-items:stretch}}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1 style="margin-top:10px;font-size:42px;font-family:Georgia,'Noto Serif TC',serif">店家建築總覽與成就勳章</h1>
      <p class="hint" style="margin-top:8px">透過評論、星等、個人成就與店家勳章，觀察店家從木屋一路成長到高樓。</p>
      <div class="stats">
        <div class="stat"><div class="hint">店家數</div><strong id="city-store-count">0</strong></div>
        <div class="stat"><div class="hint">評論數</div><strong id="city-comment-count">0</strong></div>
        <div class="stat"><div class="hint">回覆數</div><strong id="city-reply-count">0</strong></div>
        <div class="stat"><div class="hint">建築頁數</div><strong id="city-participant-count">0</strong></div>
      </div>
      <div id="skyline" class="skyline"></div>
    </section>
    <section class="grid">
      <div>
        <div class="panel comment-panel">
          <div class="toolbar">
            <div>
              <h2>新增評論與分類瀏覽</h2>
              <p class="hint" style="margin-top:6px">送出評論後，可以直接在下方依分類與星等瀏覽留言列表。</p>
            </div>
            <div style="min-width:180px"><label for="comment-sort">排序方式</label><select id="comment-sort"><option value="latest">最新優先</option><option value="highestRating">星等優先</option></select></div>
          </div>
          <div class="two section">
            <div><label for="comment-wallet">留言者名稱</label><select id="comment-wallet"><option value="0xabc123">0xabc123</option><option value="0xdef456">0xdef456</option><option value="0xghi789">0xghi789</option><option value="0xjkl012">0xjkl012</option><option value="0xlmn345">0xlmn345</option></select></div>
            <div><label for="store-id">店家編號</label><input id="store-id" value="store_001"></div>
            <div><label for="comment-category">評論分類</label><select id="comment-category"></select></div>
            <div><label for="comment-rating">星等</label><select id="comment-rating"><option value="5">5 星</option><option value="4">4 星</option><option value="3">3 星</option><option value="2">2 星</option><option value="1">1 星</option></select></div>
          </div>
          <div class="section"><label for="comment-content">評論內容</label><textarea id="comment-content" placeholder="輸入你對餐點、服務、環境或價格的評價。"></textarea></div>
          <div class="two section"><button id="comment-submit">送出評論</button><button id="refresh-all" class="secondary">重新整理資料</button></div>
          <div id="comment-message" class="message"></div>
          <div id="category-chips" class="chips section"></div>
          <div id="comments-list" class="list"></div>
        </div>
        <div class="panel">
          <h2>個人勳章與兌換</h2>
          <p class="hint" style="margin-top:6px">載入指定錢包後，可查看個人勳章進度、演化勳章與兌換展示效果。</p>
          <div class="two section">
            <div><label for="badge-wallet">錢包地址</label><select id="badge-wallet"><option value="0xabc123">0xabc123</option><option value="0xdef456">0xdef456</option><option value="0xghi789">0xghi789</option><option value="0xjkl012">0xjkl012</option><option value="0xlmn345">0xlmn345</option></select></div>
            <div style="display:flex;align-items:end"><button id="badge-load">載入勳章資料</button></div>
          </div>
          <div id="badge-message" class="message"></div>
          <div id="badge-summary" class="three section"></div>
          <div id="badge-catalog" class="list section"></div>
          <div id="reward-catalog" class="list section"></div>
          <div id="reward-history" class="list section"></div>
        </div>
      </div>
      <div>
        <div class="panel">
          <h2>建築詳細資訊</h2>
          <p class="hint" style="margin-top:6px">點選上方建築後，可查看分數進度、留言記錄、店家勳章與建築特色。</p>
          <div id="building-detail" class="section"></div>
        </div>
        <div class="panel">
          <h2>店家勳章系統</h2>
          <p class="hint" style="margin-top:6px">會依照目前選中的店家，自動顯示店家勳章進度與達成等級。</p>
          <div id="store-badge-catalog" class="list section"></div>
        </div>
        <div class="panel">
          <h2>個人成就看板</h2>
          <div class="two section">
            <div><label for="achievement-wallet">查詢錢包</label><select id="achievement-wallet"><option value="0xabc123">0xabc123</option><option value="0xdef456">0xdef456</option><option value="0xghi789">0xghi789</option><option value="0xjkl012">0xjkl012</option><option value="0xlmn345">0xlmn345</option></select></div>
            <div style="display:flex;align-items:end"><button id="achievement-load">載入成就</button></div>
          </div>
          <div class="three section">
            <div class="stat"><div class="hint">總積分</div><strong id="total-points">0</strong></div>
            <div class="stat"><div class="hint">評論數</div><strong id="comment-count">0</strong></div>
            <div class="stat"><div class="hint">收到回覆</div><strong id="received-reply-count">0</strong></div>
          </div>
        </div>
        <div class="panel"><h2>成就排行榜</h2><div id="ranking-list" class="list section"></div></div>
        <div class="panel"><h2>成就紀錄</h2><div id="achievement-logs" class="list section"></div></div>
      </div>
    </section>
  </div>
  <script>
    const API_CATEGORY_MAP={餐點:'food',服務:'service',環境:'environment',價格:'price',出餐速度:'speed',推薦程度:'recommendation',其他:'other'};
    const DISPLAY_CATEGORY_MAP={food:'餐點',service:'服務',environment:'環境',price:'價格',speed:'出餐速度',recommendation:'推薦程度',other:'其他'};
    const BADGE_NAME_MAP={food_explorer:'美食探索者',five_star_critic:'五星評論家',interaction_master:'互動達人',building_cultivator:'建築培育師'};
    const BADGE_DESC_MAP={food_explorer:'累積評論數量，解鎖美食探索勳章。',five_star_critic:'累積五星評論，提升評論家等級。',interaction_master:'累積被回覆次數，解鎖互動成就。',building_cultivator:'參與店家建築升級，解鎖建築培育勳章。'};
    const BADGE_ICON_MAP={food_explorer:'食',five_star_critic:'星',interaction_master:'聊',building_cultivator:'樓'};
    const REWARD_NAME_MAP={frame_bronze:'銅階頭像框',skin_harbor:'港灣建築主題',title_master:'美食達人稱號'};
    const REWARD_DESC_MAP={frame_bronze:'套用後，留言者名稱會顯示銅色效果。',skin_harbor:'解鎖店家建築的港灣風格展示效果。',title_master:'解鎖個人頁展示的美食達人稱號。'};
    const CATS=['全部','餐點','服務','環境','價格','出餐速度','推薦程度','其他'];
    const STAR_LABELS=['','★','★★','★★★','★★★★','★★★★★'];
    const STORE_BADGE_NAME_MAP={popular_store:'人氣店家',quality_store:'口碑店家',diverse_store:'多元店家',landmark_store:'地標店家'};
    const STORE_BADGE_DESC_MAP={popular_store:'依評論數量成長的店家勳章。',quality_store:'依平均星等與高星評論累積的店家勳章。',diverse_store:'依評論分類多樣性成長的店家勳章。',landmark_store:'依建築樓層與建築分數達成的店家勳章。'};
    const state={activeCategory:'全部',comments:[],commentPage:0,buildings:[],selectedBuildingId:'',buildingPage:0,buildingComments:[],buildingCategory:'全部',buildingHistoryPage:0,achievementPage:0,rankingPage:0,badgeCatalog:[],badgeState:null,rewardCatalog:[],storeBadgeCatalog:[],storeBadgeState:null,walletBadgeMap:{},walletRewardMap:{}};
    const PER_PAGE=5;
    const HISTORY_PER_PAGE=5;
    const el=id=>document.getElementById(id);
    const esc=v=>String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');
    const toApiCategory=v=>API_CATEGORY_MAP[v]||'other';
    const toDisplayCategory=v=>DISPLAY_CATEGORY_MAP[v]||v||'其他';
    const badgeLevel=n=>n>=3?'金階':n>=2?'銀階':n>=1?'銅階':'尚未解鎖';
    const reasonLabel=r=>({comment_reward:'發表評論',reply_reward:'回覆評論',reply_received_reward:'收到回覆'})[r]||r;
    const starText=n=>STAR_LABELS[Math.max(0,Math.min(5,Number(n||0)))]||'未評分';
    const API_BASE = window.location.hostname === "localhost" ? "http://localhost:8080" : window.location.origin; async function api(url,options){const response=await fetch(`${API_BASE}${url}`,Object.assign({headers:{'Content-Type':'application/json'}},options||{}));const data=await response.json();if(!response.ok) throw new Error(data.error||'發生未知錯誤');return data;}
    function init(){el('comment-category').innerHTML=CATS.slice(1).map(c=>'<option value="'+esc(c)+'">'+esc(c)+'</option>').join('');el('comment-submit').onclick=submitComment;el('refresh-all').onclick=loadAll;el('comment-sort').onchange=renderComments;el('achievement-load').onclick=loadAchievements;el('badge-load').onclick=loadBadgeState;loadAll();}
    async function loadAll(){await Promise.all([loadComments(),loadCity(),loadAchievements(),loadRanking(),loadBadgeCatalog(),loadStoreBadgeCatalog(),loadBadgeState(),loadRewardCatalog()]);}
    async function loadComments(){const storeId=el('store-id').value.trim();el('comments-list').innerHTML='<div class="empty">正在載入評論...</div>';try{state.comments=await api('/api/comments?storeId='+encodeURIComponent(storeId));await ensureWalletProfiles(state.comments.map(c=>c.walletAddress));renderCommentCategories();renderComments();}catch(error){el('comments-list').innerHTML='<div class="empty">'+esc(error.message)+'</div>';}}
    function renderCommentCategories(){const counts={全部:state.comments.length};CATS.slice(1).forEach(c=>counts[c]=0);state.comments.forEach(c=>{const key=toDisplayCategory(c.category);counts[key]=(counts[key]||0)+1;});el('category-chips').className='category-grid section';el('category-chips').innerHTML=CATS.map(c=>'<button class="chip'+(state.activeCategory===c?' active':'')+'" data-cat="'+esc(c)+'">'+esc(c)+' '+(counts[c]||0)+'</button>').join('');document.querySelectorAll('[data-cat]').forEach(node=>{node.onclick=()=>{state.activeCategory=node.dataset.cat;state.commentPage=0;renderCommentCategories();renderComments();};});}
    function renderComments(){let items=state.comments.slice();if(state.activeCategory!=='全部'){items=items.filter(c=>toDisplayCategory(c.category)===state.activeCategory);}items.sort((a,b)=>el('comment-sort').value==='highestRating'?((b.rating||0)-(a.rating||0))||(new Date(b.createdAt)-new Date(a.createdAt)):new Date(b.createdAt)-new Date(a.createdAt));if(!items.length){el('comments-list').innerHTML='<div class="empty">目前沒有符合條件的評論。</div>';return;}const totalPages=Math.max(1,Math.ceil(items.length/HISTORY_PER_PAGE));if(state.commentPage>=totalPages) state.commentPage=totalPages-1;const pageItems=items.slice(state.commentPage*HISTORY_PER_PAGE,state.commentPage*HISTORY_PER_PAGE+HISTORY_PER_PAGE);const pager=totalPages>1?'<div class="pager" style="padding:8px 0 0"><button class="secondary" id="comment-prev" '+(state.commentPage===0?'disabled':'')+'>上一頁</button><div class="meta">第 '+(state.commentPage+1)+' / '+totalPages+' 頁</div><button class="secondary" id="comment-next" '+(state.commentPage===totalPages-1?'disabled':'')+'>下一頁</button></div>':'';el('comments-list').innerHTML=pageItems.map(c=>'<div class="card"><div class="row"><div><strong class="'+walletNameClass(c.walletAddress)+'">'+esc(c.walletAddress)+'</strong>'+renderWalletBadges(c.walletAddress)+'<div class="meta" style="margin-top:6px">'+new Date(c.createdAt).toLocaleString()+'</div></div><div class="tags"><span class="tag">'+esc(toDisplayCategory(c.category))+'</span><span class="stars">'+starText(c.rating)+'</span></div></div><h3 style="margin-top:10px;font-size:18px">'+esc(c.content)+'</h3></div>').join('')+pager;const prev=el('comment-prev');const next=el('comment-next');if(prev) prev.onclick=()=>{state.commentPage--;renderComments();};if(next) next.onclick=()=>{state.commentPage++;renderComments();};}
    async function submitComment(){const payload={storeId:el('store-id').value.trim(),walletAddress:el('comment-wallet').value,category:toApiCategory(el('comment-category').value),rating:Number(el('comment-rating').value),content:el('comment-content').value.trim()};el('comment-message').innerHTML='';try{const result=await api('/api/achievements/comment',{method:'POST',body:JSON.stringify(payload)});el('comment-message').innerHTML='<span class="success">評論已送出，新增 '+result.pointsAdded+' 分，目前總積分 '+result.totalPoints+' 分。</span>';el('comment-content').value='';await loadAll();}catch(error){el('comment-message').innerHTML='<span class="error">'+esc(error.message)+'</span>';}}
    async function loadCity(){const city=await api('/api/city');el('city-store-count').textContent=city.storeCount||0;el('city-comment-count').textContent=city.totalComments||0;el('city-reply-count').textContent=city.totalReplies||0;el('city-participant-count').textContent=Math.max(1,Math.ceil((city.storeCount||0)/PER_PAGE));state.buildings=city.buildings||[];if(!state.selectedBuildingId&&state.buildings.length) state.selectedBuildingId=state.buildings[0].id;if(state.selectedBuildingId&&!state.buildings.find(i=>i.id===state.selectedBuildingId)){state.selectedBuildingId=state.buildings.length?state.buildings[0].id:'';}syncPage();renderSkyline();await loadSelectedBuildingComments();if(state.selectedBuildingId){await loadStoreBadgeState(state.selectedBuildingId);}renderBuildingDetail();}
    function syncPage(){const index=state.buildings.findIndex(x=>x.id===state.selectedBuildingId);if(index>=0) state.buildingPage=Math.floor(index/PER_PAGE);if(state.buildingPage<0) state.buildingPage=0;}
    function renderSkyline(){const node=el('skyline');if(!state.buildings.length){node.innerHTML='<div class="empty" style="margin:16px">目前還沒有店家建築資料。</div>';return;}const pages=Math.max(1,Math.ceil(state.buildings.length/PER_PAGE));if(state.buildingPage>=pages) state.buildingPage=pages-1;const items=state.buildings.slice(state.buildingPage*PER_PAGE,state.buildingPage*PER_PAGE+PER_PAGE);node.innerHTML='<div class="skygrid">'+items.map(b=>'<button class="building-btn'+(state.selectedBuildingId===b.id?' active':'')+'" data-building="'+esc(b.id)+'"><div class="building-frame">'+buildingSvg(b)+'</div><div class="building-meta"><strong>'+esc(b.id)+'</strong><div class="meta">'+b.buildingScore+' 分・'+b.floors+' 層</div></div></button>').join('')+'</div>'+(pages>1?'<div class="pager"><button class="secondary" id="prev-page" '+(state.buildingPage===0?'disabled':'')+'>上一頁</button><div class="meta">第 '+(state.buildingPage+1)+' / '+pages+' 頁</div><button class="secondary" id="next-page" '+(state.buildingPage===pages-1?'disabled':'')+'>下一頁</button></div>':'');document.querySelectorAll('[data-building]').forEach(node=>{node.onclick=async()=>{state.selectedBuildingId=node.dataset.building;state.buildingCategory='全部';state.buildingHistoryPage=0;syncPage();renderSkyline();await loadSelectedBuildingComments();await loadStoreBadgeState(state.selectedBuildingId);renderBuildingDetail();};});if(el('prev-page')) el('prev-page').onclick=()=>{state.buildingPage--;renderSkyline();};if(el('next-page')) el('next-page').onclick=()=>{state.buildingPage++;renderSkyline();};}
    async function loadSelectedBuildingComments(){const building=state.buildings.find(i=>i.id===state.selectedBuildingId);if(!building){state.buildingComments=[];return;}state.buildingComments=await api('/api/comments?storeId='+encodeURIComponent(building.id));await ensureWalletProfiles(state.buildingComments.map(c=>c.walletAddress));}
    function renderBuildingDetail(){const building=state.buildings.find(i=>i.id===state.selectedBuildingId);if(!building){el('building-detail').innerHTML='<div class="empty">請先選擇一棟建築。</div>';return;}const counts={全部:state.buildingComments.length};CATS.slice(1).forEach(c=>counts[c]=0);state.buildingComments.forEach(c=>counts[toDisplayCategory(c.category)]=(counts[toDisplayCategory(c.category)]||0)+1);const visibleBuildingCats=['全部',...CATS.slice(1).filter(c=>(counts[c]||0)>0)];if(!visibleBuildingCats.includes(state.buildingCategory)) state.buildingCategory='全部';const items=state.buildingComments.filter(c=>state.buildingCategory==='全部'||toDisplayCategory(c.category)===state.buildingCategory);const progress=building.nextLevelScore>0?Math.min(100,building.buildingScore/building.nextLevelScore*100):100;el('building-detail').innerHTML='<div class="card"><div class="row"><div><div class="meta">'+esc(building.district||'店家建築')+'</div><h3 style="margin-top:8px;font-size:30px;font-family:Georgia,\'Noto Serif TC\',serif">'+esc(building.title)+'</h3><div class="tags" style="margin-top:10px"><span class="badge">'+esc(building.stage)+'</span><span class="badge">'+building.floors+' 層</span><span class="badge">'+Number(building.averageRating||0).toFixed(1)+' / 5</span></div></div><div class="tags"><span class="badge">分類 '+building.categoryDiversity+'</span></div></div><div class="two section"><div class="card">'+buildingSvg(building)+'</div><div class="card"><div class="meta">建築特色</div><p style="margin-top:8px;line-height:1.7">'+esc(building.specialFeature||'這棟建築會依評論、互動與積分成長。')+'</p><div class="section"><div class="row"><span class="meta">建築分數</span><strong>'+building.buildingScore+'</strong></div><div class="row" style="margin-top:8px"><span class="meta">下一層門檻</span><strong>'+building.nextLevelScore+'</strong></div><div class="progress"><span style="width:'+progress.toFixed(1)+'%"></span></div></div><div class="tags section">'+(building.badges||[]).map(x=>'<span class="tag">'+esc(x.label)+'</span>').join('')+'</div></div></div><div class="three section"><div class="stat"><div class="hint">評論數</div><strong>'+building.commentCount+'</strong></div><div class="stat"><div class="hint">平均星等</div><strong>'+Number(building.averageRating||0).toFixed(1)+'</strong></div><div class="stat"><div class="hint">建築分數</div><strong>'+building.buildingScore+'</strong></div></div><div class="section"><h3>評論分類</h3><p class="hint" style="margin-top:6px">點選分類後，下方只顯示該分類的留言記錄。</p><div class="category-grid section">'+visibleBuildingCats.map(c=>'<button class="chip'+(state.buildingCategory===c?' active':'')+'" data-bcat="'+esc(c)+'">'+esc(c)+' '+(counts[c]||0)+'</button>').join('')+'</div></div><div class="section">'+renderHistory(items)+'</div></div>';document.querySelectorAll('[data-bcat]').forEach(node=>{node.onclick=()=>{state.buildingCategory=node.dataset.bcat;state.buildingHistoryPage=0;renderBuildingDetail();};});}
    function renderHistory(items){if(!items.length){return '<div class="empty">目前沒有符合分類的留言記錄。</div>';}const totalPages=Math.max(1,Math.ceil(items.length/HISTORY_PER_PAGE));if(state.buildingHistoryPage>=totalPages) state.buildingHistoryPage=totalPages-1;const pageItems=items.slice(state.buildingHistoryPage*HISTORY_PER_PAGE,state.buildingHistoryPage*HISTORY_PER_PAGE+HISTORY_PER_PAGE);const pager=totalPages>1?'<div class="pager" style="padding:8px 0 0"><button class="secondary" id="history-prev" '+(state.buildingHistoryPage===0?'disabled':'')+'>上一頁</button><div class="meta">第 '+(state.buildingHistoryPage+1)+' / '+totalPages+' 頁</div><button class="secondary" id="history-next" '+(state.buildingHistoryPage===totalPages-1?'disabled':'')+'>下一頁</button></div>':'';setTimeout(()=>{const prev=el('history-prev');const next=el('history-next');if(prev) prev.onclick=()=>{state.buildingHistoryPage--;renderBuildingDetail();};if(next) next.onclick=()=>{state.buildingHistoryPage++;renderBuildingDetail();};},0);return '<h3>留言記錄</h3><p class="hint" style="margin-top:6px">這裡會顯示該店家的留言者與評論內容。</p><div class="list section">'+pageItems.map(c=>'<div class="card"><div class="row"><div><strong class="'+walletNameClass(c.walletAddress)+'">'+esc(c.walletAddress)+'</strong>'+renderWalletBadges(c.walletAddress)+'<div class="meta" style="margin-top:6px">'+new Date(c.createdAt).toLocaleString()+'</div></div><div class="tags"><span class="tag">'+esc(toDisplayCategory(c.category))+'</span><span class="stars">'+starText(c.rating)+'</span></div></div><div style="margin-top:10px;font-weight:700">'+esc(c.content)+'</div></div>').join('')+'</div>'+pager;}
    async function ensureWalletProfiles(wallets){const unique=[...new Set((wallets||[]).filter(Boolean))];const missing=unique.filter(wallet=>!(wallet in state.walletBadgeMap)||!(wallet in state.walletRewardMap));if(!missing.length) return;await Promise.all(missing.map(async wallet=>{try{const data=await api('/api/personal-badges/user?walletAddress='+encodeURIComponent(wallet));state.walletBadgeMap=(state.walletBadgeMap||{});state.walletRewardMap=(state.walletRewardMap||{});state.walletBadgeMap[wallet]=(data.badges||[]).filter(b=>(b.currentLevel||0)>0);state.walletRewardMap[wallet]=data.recentRedemptions||[];}catch(_){state.walletBadgeMap[wallet]=[];state.walletRewardMap[wallet]=[];}}));}
    function walletNameClass(wallet){const rewards=state.walletRewardMap[wallet]||[];return rewards.some(r=>r.rewardId==='frame_bronze')?'bronze-name':'';}
    function renderWalletBadges(wallet){const badges=(state.walletBadgeMap[wallet]||[]).slice(0,2);if(!badges.length) return '';return '<div class="tags" style="margin-top:8px">'+badges.map(b=>'<span class="badge">'+esc(BADGE_NAME_MAP[b.badgeType]||b.name||b.badgeType)+' '+esc(badgeLevel(b.currentLevel))+'</span>').join('')+'</div>';}
    async function loadAchievements(){const data=await api('/api/achievements/user?walletAddress='+encodeURIComponent(el('achievement-wallet').value));el('total-points').textContent=data.totalPoints||0;el('comment-count').textContent=data.summary.commentCount||0;el('received-reply-count').textContent=data.summary.receivedReplyCount||0;const logs=(data.logs||[]).slice().reverse();if(!logs.length){el('achievement-logs').innerHTML='<div class="empty">這個錢包目前還沒有成就紀錄。</div>';return;}const totalPages=Math.max(1,Math.ceil(logs.length/HISTORY_PER_PAGE));if(state.achievementPage>=totalPages) state.achievementPage=totalPages-1;const pageItems=logs.slice(state.achievementPage*HISTORY_PER_PAGE,state.achievementPage*HISTORY_PER_PAGE+HISTORY_PER_PAGE);const pager=totalPages>1?'<div class="pager" style="padding:8px 0 0"><button class="secondary" id="achievement-prev" '+(state.achievementPage===0?'disabled':'')+'>上一頁</button><div class="meta">第 '+(state.achievementPage+1)+' / '+totalPages+' 頁</div><button class="secondary" id="achievement-next" '+(state.achievementPage===totalPages-1?'disabled':'')+'>下一頁</button></div>':'';el('achievement-logs').innerHTML=pageItems.map(log=>'<div class="card"><strong>+'+log.points+' 分</strong><div class="meta" style="margin-top:8px">'+esc(reasonLabel(log.reason))+'</div><div class="meta" style="margin-top:6px">'+new Date(log.createdAt).toLocaleString()+'</div></div>').join('')+pager;const prev=el('achievement-prev');const next=el('achievement-next');if(prev) prev.onclick=()=>{state.achievementPage--;loadAchievements();};if(next) next.onclick=()=>{state.achievementPage++;loadAchievements();};}
    async function loadRanking(){const data=await api('/api/achievements/ranking?limit=50');if(!data.length){el('ranking-list').innerHTML='<div class="empty">目前沒有排行榜資料。</div>';return;}const totalPages=Math.max(1,Math.ceil(data.length/HISTORY_PER_PAGE));if(state.rankingPage>=totalPages) state.rankingPage=totalPages-1;const pageItems=data.slice(state.rankingPage*HISTORY_PER_PAGE,state.rankingPage*HISTORY_PER_PAGE+HISTORY_PER_PAGE);const pager=totalPages>1?'<div class="pager" style="padding:8px 0 0"><button class="secondary" id="ranking-prev" '+(state.rankingPage===0?'disabled':'')+'>上一頁</button><div class="meta">第 '+(state.rankingPage+1)+' / '+totalPages+' 頁</div><button class="secondary" id="ranking-next" '+(state.rankingPage===totalPages-1?'disabled':'')+'>下一頁</button></div>':'';el('ranking-list').innerHTML=pageItems.map(item=>'<div class="card"><strong>第 '+item.rank+' 名・'+esc(item.walletAddress)+'</strong><div class="meta" style="margin-top:8px">總積分 '+item.totalPoints+' 分・評論 '+item.commentCount+' 則</div></div>').join('')+pager;const prev=el('ranking-prev');const next=el('ranking-next');if(prev) prev.onclick=()=>{state.rankingPage--;loadRanking();};if(next) next.onclick=()=>{state.rankingPage++;loadRanking();};}
    async function loadBadgeCatalog(){state.badgeCatalog=await api('/api/personal-badges/catalog');renderBadgeCatalog();}
    async function loadStoreBadgeCatalog(){state.storeBadgeCatalog=await api('/api/store-badges/catalog');if(state.selectedBuildingId){await loadStoreBadgeState(state.selectedBuildingId);}else{renderStoreBadges();}}
    async function loadBadgeState(){const wallet=el('badge-wallet').value;state.badgeState=await api('/api/personal-badges/user?walletAddress='+encodeURIComponent(wallet));state.walletBadgeMap[wallet]=(state.badgeState.badges||[]).filter(b=>(b.currentLevel||0)>0);state.walletRewardMap[wallet]=state.badgeState.recentRedemptions||[];renderBadgeSummary();renderBadgeCatalog();renderRewardCatalog();renderRewardHistory();renderBuildingDetail();}
    async function loadStoreBadgeState(storeId){state.storeBadgeState=await api('/api/store-badges/store?storeId='+encodeURIComponent(storeId));renderStoreBadges();}
    async function loadRewardCatalog(){state.rewardCatalog=await api('/api/rewards/catalog');renderRewardCatalog();}
    function renderBadgeSummary(){const data=state.badgeState;if(!data){el('badge-summary').innerHTML='';return;}el('badge-summary').innerHTML='<div class="stat"><div class="hint">總積分</div><strong>'+data.totalPoints+'</strong></div><div class="stat"><div class="hint">已花費積分</div><strong>'+data.spentPoints+'</strong></div><div class="stat"><div class="hint">可用積分</div><strong>'+data.availablePoints+'</strong></div>';}
    function renderBadgeCatalog(){const node=el('badge-catalog');if(!state.badgeCatalog.length){node.innerHTML='<div class="empty">正在載入勳章資料...</div>';return;}const badgeMap={};if(state.badgeState&&state.badgeState.badges){state.badgeState.badges.forEach(b=>badgeMap[b.badgeType]=b);}node.innerHTML='<h3>個人勳章演化</h3>'+state.badgeCatalog.map(item=>{const userBadge=badgeMap[item.badgeType];const currentLevel=userBadge?userBadge.currentLevel:0;const eligibleLevel=userBadge?userBadge.eligibleLevel:0;const canEvolve=eligibleLevel>currentLevel;return '<div class="badge-card"><div class="badge-header"><div class="badge-mark">'+esc(BADGE_ICON_MAP[item.badgeType]||'徽')+'</div><div style="flex:1"><strong style="font-size:20px">'+esc(BADGE_NAME_MAP[item.badgeType]||item.name)+'</strong><div class="meta" style="margin-top:6px">'+esc(BADGE_DESC_MAP[item.badgeType]||item.description)+'</div><div class="tags" style="margin-top:10px"><span class="badge">目前：'+badgeLevel(currentLevel)+'</span><span class="badge">可達：'+badgeLevel(eligibleLevel)+'</span></div></div></div><div class="meta section">門檻：銅階 '+item.bronzeThreshold+' / 銀階 '+item.silverThreshold+' / 金階 '+item.goldThreshold+'</div><div class="two section"><button data-evolve="'+esc(item.badgeType)+'" '+(canEvolve?'':'disabled')+'>演化勳章</button><button class="secondary" disabled>'+(canEvolve?'已達成下一階，可演化':'尚未達成下一階')+'</button></div></div>';}).join('');document.querySelectorAll('[data-evolve]').forEach(node=>{node.onclick=async()=>{el('badge-message').innerHTML='';try{const result=await api('/api/personal-badges/evolve',{method:'POST',body:JSON.stringify({walletAddress:el('badge-wallet').value,badgeType:node.dataset.evolve})});el('badge-message').innerHTML='<span class="success">'+esc(BADGE_NAME_MAP[node.dataset.evolve]||result.badgeName)+' 已演化到 '+result.currentLevel+' 階。</span>';await loadBadgeState();}catch(error){el('badge-message').innerHTML='<span class="error">'+esc(error.message)+'</span>';}};});}
    function renderRewardCatalog(){const node=el('reward-catalog');if(!state.rewardCatalog.length){node.innerHTML='<div class="empty">正在載入獎勵資料...</div>';return;}const levels={};if(state.badgeState&&state.badgeState.badges){state.badgeState.badges.forEach(b=>levels[b.badgeType]=b.currentLevel);}const available=state.badgeState?state.badgeState.availablePoints:0;node.innerHTML='<h3>獎勵兌換</h3>'+state.rewardCatalog.map(item=>{const enoughPoints=available>=item.costPoints;const enoughBadge=!item.requiredBadgeType||(levels[item.requiredBadgeType]||0)>=(item.requiredBadgeLevel||0);const canRedeem=enoughPoints&&enoughBadge;const required=item.requiredBadgeType?'需要 '+(BADGE_NAME_MAP[item.requiredBadgeType]||item.requiredBadgeType)+' '+item.requiredBadgeLevel+' 階':'無額外勳章條件';return '<div class="reward-box"><div class="row"><div><strong>'+esc(REWARD_NAME_MAP[item.rewardId]||item.name)+'</strong><div class="meta" style="margin-top:6px">'+esc(REWARD_DESC_MAP[item.rewardId]||item.description)+'</div></div><span class="reward-pill">'+item.costPoints+' 分</span></div><div class="meta section">'+required+'</div><button class="section" data-redeem="'+esc(item.rewardId)+'" '+(canRedeem?'':'disabled')+'>兌換獎勵</button></div>';}).join('');document.querySelectorAll('[data-redeem]').forEach(node=>{node.onclick=async()=>{el('badge-message').innerHTML='';try{const result=await api('/api/rewards/redeem',{method:'POST',body:JSON.stringify({walletAddress:el('badge-wallet').value,rewardId:node.dataset.redeem})});el('badge-message').innerHTML='<span class="success">已兌換 '+esc(REWARD_NAME_MAP[node.dataset.redeem]||result.rewardName)+'，剩餘可用積分 '+result.availablePoints+' 分。</span>';await loadBadgeState();}catch(error){el('badge-message').innerHTML='<span class="error">'+esc(error.message)+'</span>';}};});}
    function renderRewardHistory(){const node=el('reward-history');const redemptions=state.badgeState&&state.badgeState.recentRedemptions?state.badgeState.recentRedemptions:[];node.innerHTML='<h3>最近兌換紀錄</h3>'+(!redemptions.length?'<div class="empty">目前沒有兌換紀錄。</div>':redemptions.map(item=>'<div class="reward-box"><div class="row"><div><strong>'+esc(REWARD_NAME_MAP[item.rewardId]||item.rewardName)+'</strong><div class="meta" style="margin-top:6px">已套用個人展示效果</div></div><span class="reward-pill">花費 '+item.spentPoints+' 分</span></div><div class="section" style="display:flex;gap:10px;flex-wrap:wrap"><span class="badge">兌換時間 '+new Date(item.createdAt).toLocaleString()+'</span><span class="badge">效果會顯示在個人留言名稱與勳章區</span></div></div>').join(''));}
    function renderStoreBadges(){const node=el('store-badge-catalog');const catalog=state.storeBadgeCatalog||[];const data=state.storeBadgeState; if(!catalog.length){node.innerHTML='<div class="empty">正在載入店家勳章資料...</div>';return;} if(!data||!data.storeId){node.innerHTML='<div class="empty">請先點選上方建築，即可查看該店家的勳章進度。</div>';return;} const badgeMap={}; (data.badges||[]).forEach(b=>badgeMap[b.badgeType]=b); node.innerHTML='<div class="card"><strong>'+esc(data.storeId)+'</strong><div class="meta" style="margin-top:8px">目前建築 '+data.floors+' 層・建築分數 '+data.buildingScore+' 分</div></div>'+catalog.map(item=>{const badge=badgeMap[item.badgeType]||{currentLevel:0,progress:0}; return '<div class="badge-card"><div class="badge-header"><div class="badge-mark">店</div><div style="flex:1"><strong style="font-size:20px">'+esc(STORE_BADGE_NAME_MAP[item.badgeType]||item.name)+'</strong><div class="meta" style="margin-top:6px">'+esc(STORE_BADGE_DESC_MAP[item.badgeType]||item.description)+'</div><div class="tags" style="margin-top:10px"><span class="badge">目前：'+badgeLevel(badge.currentLevel)+'</span><span class="badge">進度：'+badge.progress+'</span></div></div></div><div class="meta section">門檻：銅階 '+item.bronzeThreshold+' / 銀階 '+item.silverThreshold+' / 金階 '+item.goldThreshold+'</div></div>';}).join('');}
    function buildingSvg(building){const floors=Math.max(1,Number(building.floors||1));const bodyHeight=60+floors*18;const base=260;const y=base-bodyHeight;const left=68;const width=108;const fill=esc(building.themeColor||'#c89b6a');const accent=esc(building.accentColor||'#8b6647');const win=esc(building.windowColor||'#fff2cd');let windows='';for(let floor=0;floor<floors;floor++){for(let col=0;col<4;col++){windows+='<rect x="'+(left+12+col*22)+'" y="'+(base-18-floor*18)+'" width="12" height="10" rx="1.5" fill="'+win+'" stroke="#8a6c4b" stroke-width="1"></rect>';}}return '<svg viewBox="0 0 240 280" xmlns="http://www.w3.org/2000/svg"><line x1="0" y1="240" x2="240" y2="240" stroke="#ccb99c" stroke-width="2"></line><rect x="'+left+'" y="'+y+'" width="'+width+'" height="'+bodyHeight+'" rx="8" fill="'+fill+'" stroke="#7a5c40" stroke-width="2"></rect><rect x="'+(left-16)+'" y="'+(base-16)+'" width="'+(width+32)+'" height="16" fill="'+accent+'" stroke="#7a5c40" stroke-width="2"></rect>'+roofSvg(building.roofStyle||'gable',left,width,y,accent)+windows+'<text x="120" y="272" text-anchor="middle" fill="#7a5c40" font-size="12" font-family="Segoe UI,Noto Sans TC,sans-serif">'+esc(building.stage||'')+'</text></svg>';}
    function roofSvg(style,left,width,y,accent){const right=left+width;if(style==='spire'){return '<polygon points="'+(left+16)+','+y+' 120,'+(y-26)+' '+(right-16)+','+y+'" fill="'+accent+'" stroke="#7a5c40" stroke-width="2"></polygon><line x1="120" y1="'+(y-26)+'" x2="120" y2="'+(y-46)+'" stroke="#7a5c40" stroke-width="2"></line>';}if(style==='crown'){return '<rect x="'+(left+16)+'" y="'+(y-14)+'" width="'+(width-32)+'" height="14" fill="'+accent+'" stroke="#7a5c40" stroke-width="2"></rect><rect x="'+(left+34)+'" y="'+(y-28)+'" width="'+(width-68)+'" height="14" fill="'+accent+'" stroke="#7a5c40" stroke-width="2"></rect>';}if(style==='terrace'){return '<rect x="'+(left+18)+'" y="'+(y-12)+'" width="'+(width-36)+'" height="12" fill="'+accent+'" stroke="#7a5c40" stroke-width="2"></rect>';}return '<polygon points="'+left+','+y+' 120,'+(y-24)+' '+right+','+y+'" fill="'+accent+'" stroke="#7a5c40" stroke-width="2"></polygon>';}
    document.addEventListener('DOMContentLoaded',init);
  </script>
